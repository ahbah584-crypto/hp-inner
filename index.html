<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KMZ Exporter Pro | Workspace</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --border: #333333;
            --text: #e0e0e0;
            --text-dim: #888888;
            --accent: #ffffff;
            --error: #ff5252;
            --success: #03dac6;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
            background: radial-gradient(circle at center, #1e1e2f 0%, #121212 100%);
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        h2 { color: var(--accent); text-align: center; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        p.subtitle { text-align: center; color: var(--text-dim); font-size: 14px; margin-bottom: 35px; }

        .input-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border); padding: 20px;
            border-radius: 12px; text-align: center; margin-bottom: 20px;
        }
        
        label { display: block; margin-bottom: 12px; color: var(--accent); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        input[type="file"] { width: 100%; color: var(--text-dim); font-size: 13px; }

        button {
            width: 100%; padding: 18px;
            background-color: var(--accent);
            border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; color: #000;
            text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; margin-top: 10px;
        }

        button:hover { background-color: #cccccc; transform: translateY(-2px); }

        #log {
            margin-top: 25px; padding: 15px; background: #000;
            border-radius: 8px; font-family: monospace; font-size: 12px;
            display: none; max-height: 200px; overflow-y: auto;
            border: 1px solid var(--border); line-height: 1.6;
        }

        .alert-item { color: var(--error); font-weight: bold; }
        .success-item { color: var(--success); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="card">
    <h2>KMZ EXPORTER</h2>
    <p class="subtitle">Spatial Grouping & Record System</p>
    
    <div class="input-box">
        <label>File Home Pass (KMZ/KML)</label>
        <input type="file" id="hpFile" accept=".kmz,.kml">
    </div>

    <div class="input-box">
        <label>File FAT (KMZ/KML)</label>
        <input type="file" id="fatFile" accept=".kmz,.kml">
    </div>

    <button onclick="prosesData()">EKSEKUSI DATA</button>
    <div id="log"></div>
</div>

<script>
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function extractKml(file) {
        if (file.name.endsWith('.kml')) return await file.text();
        const zip = await JSZip.loadAsync(file);
        const kmlFile = Object.keys(zip.files).find(name => name.endsWith('.kml'));
        return await zip.files[kmlFile].async("string");
    }

    function parsePlacemarks(xmlText) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");
        const placemarks = Array.from(xml.getElementsByTagName("Placemark"));
        return placemarks.map(p => {
            const name = p.getElementsByTagName("name")[0]?.textContent.trim() || "NULL";
            const coordText = p.getElementsByTagName("coordinates")[0]?.textContent.trim();
            if (!coordText) return null;
            const [lon, lat] = coordText.split(",").map(Number);
            return { name, lat, lon, element: p };
        }).filter(item => item !== null);
    }

    async function prosesData() {
        const hpFile = document.getElementById('hpFile').files[0];
        const fatFile = document.getElementById('fatFile').files[0];
        const log = document.getElementById('log');

        if (!hpFile || !fatFile) return alert("Pilih file dulu!");

        log.style.display = "block";
        log.innerHTML = "> Memproses data...";

        try {
            const hpKmlText = await extractKml(hpFile);
            const fatKmlText = await extractKml(fatFile);

            const hpData = parsePlacemarks(hpKmlText);
            const fatData = parsePlacemarks(fatKmlText);

            let finalKml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Export Result</name>`;
            
            let rekapContent = "";
            let logHtml = "";
            let warnings = [];

            fatData.forEach(fat => {
                let matchedHp = [];
                
                hpData.forEach(hp => {
                    let minD = Infinity;
                    let bestFat = "";

                    fatData.forEach(f => {
                        const d = getDistance(hp.lat, hp.lon, f.lat, f.lon);
                        if (d < minD) {
                            minD = d;
                            bestFat = f.name;
                        }
                    });

                    if (bestFat === fat.name) {
                        matchedHp.push(hp.element.outerHTML);
                    }
                });

                if (matchedHp.length > 0) {
                    // FOLDER BERSIH (Hanya Nama FAT)
                    finalKml += `<Folder><name>${fat.name}</name>${matchedHp.join("")}</Folder>`;
                    rekapContent += fat.element.outerHTML;

                    if (matchedHp.length > 34) {
                        logHtml += `<div class="alert-item">[!] ${fat.name}: ${matchedHp.length} HP</div>`;
                        warnings.push(`${fat.name} (${matchedHp.length})`);
                    } else {
                        logHtml += `<div class="success-item">[OK] ${fat.name}: ${matchedHp.length} HP</div>`;
                    }
                }
            });

            // FOLDER REKAP DI BAWAH
            if (rekapContent !== "") {
                finalKml += `<Folder><name>REKAP FAT TERPAKAI</name>${rekapContent}</Folder>`;
            }

            finalKml += `</Document></kml>`;
            log.innerHTML = logHtml;

            if (warnings.length > 0) {
                alert("⚠️ KAPASITAS OVER (MAX 34):\n\n" + warnings.join("\n"));
            }

            const zipOut = new JSZip();
            zipOut.file("doc.kml", finalKml);
            
            if (hpFile.name.endsWith('.kmz')) {
                const zipIn = await JSZip.loadAsync(hpFile);
                for (const path in zipIn.files) {
                    if (path.startsWith('files/') || path.startsWith('images/')) {
                        zipOut.file(path, await zipIn.files[path].async("blob"));
                    }
                }
            }

            const res = await zipOut.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(res);
            a.download = "Hasil_Export_Clean.kmz";
            a.click();

        } catch (e) {
            log.innerHTML = "ERROR: " + e.message;
        }
    }
</script>
</body>
</html>
