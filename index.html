<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KMZ Auto-Group Pro | Premium Edition</title>
    <style>
        :root {
            --primary: #bb86fc;
            --primary-variant: #3700b3;
            --secondary: #03dac6;
            --background: #121212;
            --surface: #1e1e1e;
            --error: #cf6679;
            --on-background: #ffffff;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background-color: var(--background);
            color: var(--on-background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1e1e2f 0%, #121212 100%);
        }

        .card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p.subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-box {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(187, 134, 252, 0.2);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-box:hover {
            border-color: var(--primary);
            background: rgba(187, 134, 252, 0.05);
            transform: translateY(-2px);
        }

        label {
            display: block;
            margin-bottom: 12px;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        input[type="file"] {
            width: 100%;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, var(--primary), #9965f4);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            color: #000;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(187, 134, 252, 0.2);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(187, 134, 252, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(-1px);
        }

        #log {
            margin-top: 30px;
            font-size: 13px;
            color: var(--secondary);
            background: #000;
            padding: 20px;
            border-radius: 12px;
            display: none;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid rgba(3, 218, 198, 0.2);
            font-family: 'Fira Code', monospace;
            line-height: 1.6;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="card">
    <h2>KMZ EXPORTER</h2>
    <p class="subtitle">Automatic Spatial Grouping System</p>
    
    <div class="input-group">
        <label>File KMZ/KML Home Pass</label>
        <div class="input-box">
            <input type="file" id="hpFile" accept=".kmz,.kml">
        </div>
    </div>

    <div class="input-group">
        <label>File KMZ/KML FAT</label>
        <div class="input-box">
            <input type="file" id="fatFile" accept=".kmz,.kml">
        </div>
    </div>

    <button onclick="prosesKmzLuxury()">Eksekusi Data</button>
    <div id="log"></div>
</div>

<script>
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function extractKmlFromKmz(file) {
        if (file.name.endsWith('.kml')) return await file.text();
        const zip = await JSZip.loadAsync(file);
        const kmlFile = Object.keys(zip.files).find(name => name.endsWith('.kml'));
        return await zip.files[kmlFile].async("string");
    }

    function parsePlacemarks(xmlText) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");
        const placemarks = Array.from(xml.getElementsByTagName("Placemark"));
        return placemarks.map(p => {
            const name = p.getElementsByTagName("name")[0]?.textContent.trim() || "ID_NULL";
            const coordText = p.getElementsByTagName("coordinates")[0]?.textContent.trim();
            const [lon, lat] = coordText.split(",").map(Number);
            return { name, lat, lon, element: p };
        });
    }

    async function prosesKmzLuxury() {
        const hpFile = document.getElementById('hpFile').files[0];
        const fatFile = document.getElementById('fatFile').files[0];
        const log = document.getElementById('log');

        if (!hpFile || !fatFile) return alert("Bos, pilih file dulu!");

        log.style.display = "block";
        log.innerHTML = "> Memulai sinkronisasi data...";

        try {
            const hpKmlText = await extractKmlFromKmz(hpFile);
            const fatKmlText = await extractKmlFromKmz(fatFile);

            const hpData = parsePlacemarks(hpKmlText);
            const fatData = parsePlacemarks(fatKmlText);

            let finalKml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Grouping Result Luxury</name>`;
            
            fatData.forEach(fat => {
                finalKml += `<Folder><name>${fat.name}</name>`;
                hpData.forEach(hp => {
                    let minDistance = Infinity;
                    let targetFatName = "";

                    fatData.forEach(f => {
                        const d = getDistance(hp.lat, hp.lon, f.lat, f.lon);
                        if (d < minDistance) {
                            minDistance = d;
                            targetFatName = f.name;
                        }
                    });

                    if (targetFatName === fat.name) {
                        finalKml += hp.element.outerHTML;
                    }
                });
                finalKml += `</Folder>`;
            });

            finalKml += `</Document></kml>`;

            const zipOut = new JSZip();
            zipOut.file("doc.kml", finalKml);
            
            // Backup foto/files
            if (hpFile.name.endsWith('.kmz')) {
                const zipIn = await JSZip.loadAsync(hpFile);
                for (const path in zipIn.files) {
                    if (path.startsWith('files/') || path.startsWith('images/')) {
                        const content = await zipIn.files[path].async("blob");
                        zipOut.file(path, content);
                    }
                }
            }

            const blob = await zipOut.generateAsync({type:"blob"});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Data_Jaringan_Luxury.kmz";
            a.click();

            log.innerHTML += `<br>> Eksekusi Berhasil!<br>> Struktur folder sudah rapi Bos.`;
        } catch (e) {
            log.innerHTML += `<br>> ERROR: ${e.message}`;
        }
    }
</script>
</body>
</html>
