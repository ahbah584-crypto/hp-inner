<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KMZ Grouping Pro | AD PRODUCTION</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --border: #333333;
            --text: #e0e0e0;
            --text-dim: #888888;
            --accent: #ffffff;
            --error: #ff5252;
            --success: #00e676;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 40px; border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--accent); text-align: center; margin-bottom: 5px; font-weight: 600; }
        p.subtitle { text-align: center; color: var(--text-dim); font-size: 13px; margin-bottom: 35px; }

        .input-box {
            background: #181818;
            border: 1px solid var(--border); padding: 20px;
            border-radius: 6px; text-align: center; margin-bottom: 20px;
        }
        
        label { display: block; margin-bottom: 12px; color: var(--text); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        input[type="file"] { width: 100%; color: var(--text-dim); font-size: 13px; }

        button {
            width: 100%; padding: 16px;
            background-color: var(--accent);
            border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; color: #000;
            text-transform: uppercase; font-size: 14px;
            transition: 0.2s ease; margin-top: 10px;
        }

        button:hover { background-color: #cccccc; }

        #log {
            margin-top: 25px; padding: 15px; background: #000;
            border-radius: 4px; font-family: monospace; font-size: 12px;
            display: none; max-height: 200px; overflow-y: auto;
            border: 1px solid var(--border); line-height: 1.6;
        }

        .alert-item { color: var(--error); font-weight: bold; }
        .success-item { color: var(--success); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="card">
    <h2>KMZ GROUPER PRO</h2>
    <p class="subtitle">AD PRODUCTION - Clean Folder Mode</p>
    
    <div class="input-box">
        <label>File Boundary (KMZ/KML)</label>
        <input type="file" id="boundaryFile" accept=".kmz,.kml">
    </div>

    <div class="input-box">
        <label>File Home Pass (KMZ/KML)</label>
        <input type="file" id="hpFile" accept=".kmz,.kml">
    </div>

    <button onclick="prosesData()">EKSEKUSI SEKARANG</button>
    <div id="log"></div>
</div>

<script>
    function pointInPoly(point, vs) {
        var x = point[0], y = point[1], inside = false;
        for (var i = 0, j = vs.length - 1; i < vs.length; j = i++) {
            var xi = vs[i][0], yi = vs[i][1], xj = vs[j][0], yj = vs[j][1];
            var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    async function getKml(file) {
        if (file.name.endsWith('.kml')) return await file.text();
        const zip = await JSZip.loadAsync(file);
        const kml = Object.keys(zip.files).find(n => n.endsWith('.kml'));
        return await zip.files[kml].async("string");
    }

    function parseKml(xmlText, isPoly = false) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");
        const placemarks = Array.from(xml.getElementsByTagName("Placemark"));
        
        return placemarks.map(p => {
            const name = p.getElementsByTagName("name")[0]?.textContent.trim() || "ID_NULL";
            const coordNode = p.getElementsByTagName("coordinates")[0]?.textContent.trim();
            if (!coordNode) return null;

            if (isPoly) {
                const coords = coordNode.split(/\s+/).map(c => c.split(',').slice(0,2).map(Number));
                return { name, coords, element: p };
            } else {
                const [lon, lat] = coordNode.split(',').map(Number);
                return { name, lat, lon, xml: p.outerHTML };
            }
        }).filter(item => item !== null);
    }

    async function prosesData() {
        const bFile = document.getElementById('boundaryFile').files[0];
        const hFile = document.getElementById('hpFile').files[0];
        const log = document.getElementById('log');

        if (!bFile || !hFile) return alert("Pilih file dulu Bos!");

        log.style.display = "block";
        log.innerHTML = "> Memproses Area...";

        try {
            const bText = await getKml(bFile);
            const hText = await getKml(hFile);
            const boundaries = parseKml(bText, true);
            const hps = parseKml(hText, false);

            let docKml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Clean Grouping</name>`;
            let logHtml = "";
            let rekapFatContent = "";
            let overList = [];

            boundaries.forEach(poly => {
                let count = 0;
                let folderContent = "";
                
                hps.forEach(hp => {
                    if (pointInPoly([hp.lon, hp.lat], poly.coords)) {
                        folderContent += hp.xml;
                        count++;
                    }
                });

                if (count > 0) {
                    // Nama folder BERSIH (Hanya Kode FAT)
                    docKml += `<Folder><name>${poly.name}</name>${folderContent}</Folder>`;
                    rekapFatContent += poly.element.outerHTML;

                    if (count > 34) {
                        logHtml += `<div class="alert-item">[!] ${poly.name}: ${count} HP (Over!)</div>`;
                        overList.push(`${poly.name} (${count} HP)`);
                    } else {
                        logHtml += `<div class="success-item">[OK] ${poly.name}: ${count} HP</div>`;
                    }
                }
            });

            if (rekapFatContent !== "") {
                docKml += `<Folder><name>REKAP FAT TERPAKAI</name>${rekapFatContent}</Folder>`;
            }

            docKml += `</Document></kml>`;
            log.innerHTML = logHtml;

            if (overList.length > 0) {
                alert("⚠️ PERINGATAN KAPASITAS!\n\nFAT berikut melebihi 34 HP:\n" + overList.join("\n"));
            }

            const zipOut = new JSZip();
            zipOut.file("doc.kml", docKml);
            
            if (hFile.name.endsWith('.kmz')) {
                const zipIn = await JSZip.loadAsync(hFile);
                for (const path in zipIn.files) {
                    if (path.startsWith('files/') || path.startsWith('images/')) {
                        zipOut.file(path, await zipIn.files[path].async("blob"));
                    }
                }
            }

            const result = await zipOut.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(result);
            a.download = "HASIL_GROUPING_BERSIH.kmz";
            a.click();

        } catch (e) {
            log.innerHTML = "ERROR: " + e.message;
        }
    }
</script>
</body>
</html>
