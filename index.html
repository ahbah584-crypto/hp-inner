<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KMZ Grouping Pro | AD PRODUCTION</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --border: #333333;
            --text: #e0e0e0;
            --text-dim: #888888;
            --accent: #ffffff;
            --error: #ff5252;
            --success: #00e676;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 40px; border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--accent); text-align: center; margin-bottom: 5px; font-weight: 600; }
        p.subtitle { text-align: center; color: var(--text-dim); font-size: 13px; margin-bottom: 35px; }

        .input-box {
            background: #181818;
            border: 1px solid var(--border); padding: 20px;
            border-radius: 6px; text-align: center; margin-bottom: 20px;
        }
        
        label { display: block; margin-bottom: 12px; color: var(--text); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        input[type="file"] { width: 100%; color: var(--text-dim); font-size: 13px; }

        button {
            width: 100%; padding: 16px;
            background-color: var(--accent);
            border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; color: #000;
            text-transform: uppercase; font-size: 14px;
            transition: 0.2s ease; margin-top: 10px;
        }

        button:hover { background-color: #cccccc; }

        #log {
            margin-top: 25px; padding: 15px; background: #000;
            border-radius: 4px; font-family: monospace; font-size: 12px;
            display: none; max-height: 200px; overflow-y: auto;
            border: 1px solid var(--border); line-height: 1.6;
        }

        .alert-item { color: var(--error); font-weight: bold; }
        .success-item { color: var(--success); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="card">
    <h2>KMZ GROUPER PRO</h2>
    <p class="subtitle">Grouping HP & Rekap FAT Terpakai</p>
    
    <div class="input-box">
        <label>File KMZ/KML Home Pass (HP)</label>
        <input type="file" id="hpFile" accept=".kmz,.kml">
    </div>

    <div class="input-box">
        <label>File KMZ/KML FAT</label>
        <input type="file" id="fatFile" accept=".kmz,.kml">
    </div>

    <button onclick="prosesData()">EKSEKUSI DATA</button>
    <div id="log"></div>
</div>

<script>
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function extractKmlFromKmz(file) {
        if (file.name.endsWith('.kml')) return await file.text();
        const zip = await JSZip.loadAsync(file);
        const kmlFile = Object.keys(zip.files).find(name => name.endsWith('.kml'));
        return await zip.files[kmlFile].async("string");
    }

    function parsePlacemarks(xmlText) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");
        const placemarks = Array.from(xml.getElementsByTagName("Placemark"));
        return placemarks.map(p => {
            const name = p.getElementsByTagName("name")[0]?.textContent.trim() || "ID_NULL";
            const coordText = p.getElementsByTagName("coordinates")[0]?.textContent.trim();
            if (!coordText) return null;
            const [lon, lat] = coordText.split(",").map(Number);
            return { name, lat, lon, element: p };
        }).filter(item => item !== null);
    }

    async function prosesData() {
        const hpFile = document.getElementById('hpFile').files[0];
        const fatFile = document.getElementById('fatFile').files[0];
        const log = document.getElementById('log');

        if (!hpFile || !fatFile) return alert("Pilih file dulu, Bos!");

        log.style.display = "block";
        log.innerHTML = "> Memproses data...";

        try {
            const hpKmlText = await extractKmlFromKmz(hpFile);
            const fatKmlText = await extractKmlFromKmz(fatFile);

            const hpData = parsePlacemarks(hpKmlText);
            const fatData = parsePlacemarks(fatKmlText);

            let finalKml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Grouping Result</name>`;
            
            let rekapFatContent = "";
            let overCapacity = [];

            // 1. Proses Grouping HP ke dalam Folder FAT
            fatData.forEach(fat => {
                let currentHpList = [];
                
                hpData.forEach(hp => {
                    let minDistance = Infinity;
                    let targetFatName = "";

                    fatData.forEach(f => {
                        const d = getDistance(hp.lat, hp.lon, f.lat, f.lon);
                        if (d < minDistance) {
                            minDistance = d;
                            targetFatName = f.name;
                        }
                    });

                    if (targetFatName === fat.name) {
                        currentHpList.push(hp.element.outerHTML);
                    }
                });

                if (currentHpList.length > 0) {
                    // Masukkan ke Folder Grouping
                    finalKml += `<Folder><name>${fat.name} (${currentHpList.length} HP)</name>${currentHpList.join("")}</Folder>`;
                    
                    // Masukkan FAT ini ke Rekap karena terpakai
                    rekapFatContent += fat.element.outerHTML;

                    // Cek Kapasitas 34
                    if (currentHpList.length > 34) {
                        overCapacity.push(`${fat.name} (${currentHpList.length} HP)`);
                    }
                }
            });

            // 2. Tambahkan Folder Rekap FAT Terpakai di bagian bawah
            if (rekapFatContent !== "") {
                finalKml += `<Folder><name>=== REKAP FAT TERPAKAI ===</name>${rekapFatContent}</Folder>`;
            }

            finalKml += `</Document></kml>`;

            if (overCapacity.length > 0) {
                alert("⚠️ KAPASITAS LEBIH (MAX 34)!\n\n" + overCapacity.join("\n"));
            }

            const zipOut = new JSZip();
            zipOut.file("doc.kml", finalKml);
            
            if (hpFile.name.endsWith('.kmz')) {
                const zipIn = await JSZip.loadAsync(hpFile);
                for (const path in zipIn.files) {
                    if (path.startsWith('files/') || path.startsWith('images/')) {
                        zipOut.file(path, await zipIn.files[path].async("blob"));
                    }
                }
            }

            const blob = await zipOut.generateAsync({type:"blob"});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Hasil_Grouping_Lengkap.kmz";
            a.click();

            log.innerHTML = `<div class="success-item">> Selesai! Rekap FAT Terpakai sudah dibuat di folder bawah.</div>`;
        } catch (e) {
            log.innerHTML = `<div class="alert-item">> ERROR: ${e.message}</div>`;
        }
    }
</script>
</body>
</html>
